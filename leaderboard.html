<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clasament | Vectron-Juniors</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="page-home">
  <div class="app">
    <header class="hero">
      <div class="badge">FLL România • Vectron-Juniors</div>
      <h1>🏆 Clasament</h1>
      <p class="subtitle">Cele mai bune scoruri!</p>
      <a href="index.html" class="back-btn" style="margin-bottom: 20px;">← Înapoi</a>
    </header>
    <div id="leaderboard-container" class="leaderboard-container">
      <p class="leaderboard-loading">Se încarcă...</p>
    </div>
    <div id="leaderboard-error-container" class="leaderboard-error-container hidden">
      <p id="leaderboard-error" class="leaderboard-error"></p>
      <button id="leaderboard-retry" class="retry-btn">Încearcă din nou</button>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="firebase-db.js"></script>
  <script src="user.js"></script>
  <script>
    const GAME_NAMES = {
      mammoth: '🦣 Memoria Mamutului (timp)',
      monoxyl: '🛶 Aventura pe Someș (saci)',
      pazitorul: '🗿 Puzzle Păzitorul (timp)',
      pietre: '📜 Decoder (timp)',
      bratari: '📿 Mărgeaua Diferită (sec)',
      secera: '🌾 Secera (cereale)',
      lego: '🧱 Turnul LEGO (cărămizi)'
    };

    function loadLeaderboards() {
      const container = document.getElementById('leaderboard-container');
      const errorContainer = document.getElementById('leaderboard-error-container');
      const errorEl = document.getElementById('leaderboard-error');

      if (typeof getAllLeaderboards !== 'function') {
        container.innerHTML = '';
        errorEl.textContent = 'Nu s-au putut încărca clasamentele.';
        errorContainer.classList.remove('hidden');
        return;
      }

      container.innerHTML = '<p class="leaderboard-loading">Se încarcă...</p>';
      errorContainer.classList.add('hidden');

      getAllLeaderboards().then(leaderboards => {
        container.querySelector('.leaderboard-loading')?.remove();
        container.innerHTML = '';

        for (const [gameId, entries] of Object.entries(leaderboards)) {
          const card = document.createElement('div');
          card.className = 'leaderboard-card';
          const name = GAME_NAMES[gameId] || gameId;
          let rows = entries.map((e, i) =>
            `<tr><td>${i + 1}</td><td>${e.username || 'Anonim'}</td><td>${e.scoreDisplay || e.score}</td></tr>`
          ).join('') || '<tr><td colspan="3">Niciun scor încă</td></tr>';
          card.innerHTML = `
            <h3>${name}</h3>
            <table class="leaderboard-table">
              <thead><tr><th>#</th><th>Nume</th><th>Scor</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          `;
          container.appendChild(card);
        }

        if (Object.keys(leaderboards).every(id => leaderboards[id].length === 0)) {
          const emptyMsg = document.createElement('p');
          emptyMsg.className = 'leaderboard-error';
          emptyMsg.textContent = 'Niciun scor încă. Joacă și salvează scorul!';
          container.appendChild(emptyMsg);
        }
      }).catch((err) => {
        container.innerHTML = '';
        const msg = (err && err.message && err.message.includes('PERMISSION_DENIED'))
          ? 'Nu ai permisiunea de a citi clasamentul.'
          : 'Nu s-au putut încărca clasamentele.';
        errorEl.textContent = msg;
        errorContainer.classList.remove('hidden');
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadLeaderboards();
      document.getElementById('leaderboard-retry')?.addEventListener('click', loadLeaderboards);
    });
  </script>
</body>
</html>
